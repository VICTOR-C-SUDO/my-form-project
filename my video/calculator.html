<!DOCTYPE html>
<html>
<head>
    <style>
        body { display: flex; justify-content: center;
         align-items: center; height: 100vh;
          background: #f4f4f4; margin: 0; }
        .calculator { background: #1a1a1a;
         padding: 20px;
         border-radius: 20px; width: 300px;
          box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #display { width: 100%; height: 50px; 
        background: #333; color: white;
         text-align: right; font-size: 24px;
          padding: 10px; box-sizing: border-box;
           margin-bottom: 20px; border-radius: 10px; }
        .buttons { display: grid;
         grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { padding: 20px; font-size: 18px;
         border: none; border-radius: 10px;
          cursor: pointer; color: white; }
        .num { background: #444; }
        .op { background: #f39c12; }
        .equal { background: #27ae60; grid-column: span 1; }
        .func { background: #555; }
    </style>
</head>
<body>

<div class="calculator">
    <div id="display">0</div>
    <div class="buttons">
    <button class="func" onclick="clearDisplay()">AC</button>
    <button class="func" onclick="deleteLast()">DEL</button>
        <button class="op" onclick="append('%')">%</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('*')">*</button>
        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('-')">-</button>
        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>
        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let display = document.getElementById('display');
    function append(val) { if(display.innerText === '0')
     display
    .innerText = val; else display.innerText += val; }
    function clearDisplay() { display.innerText = '0'; }
    function deleteLast() { display.innerText = display.
        innerText.slice(0, -1) || '0'; }
    function calculate()
    
    { try { display.innerText
     = eval(display.innerText); } catch
      { display.innerText = 'Error'; } }
</script>

</body>
</html>
